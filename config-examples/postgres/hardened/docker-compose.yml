services:
  app:
    environment:
      DB_CLIENT: postgres
      POSTGRES_HOST: postgres
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_app_password
      POSTGRES_SSLMODE: require
    secrets:
      - postgres_app_password
    read_only: true
    tmpfs:
      - /tmp
    user: "node"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - frontend
      - backend

  postgres:
    build: ./docker/postgres
    expose:
      - "5432"
    read_only: true
    tmpfs:
      - /tmp
      - /var/run/postgresql
    cap_drop:
      - NET_RAW
    security_opt:
      - no-new-privileges:true
    secrets:
      - postgres_admin_password
      - postgres_app_password
    networks:
      - backend

networks:
  frontend:
  backend:
    internal: true
